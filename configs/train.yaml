# train.yaml

defaults:
  - _self_

  # ✅ DLP task 선택 (inverse부터)
  - task: inverse_physics_binary    
  # inverse_1_gray, inverse_physics_binary, inverse_chain_2_gray
  # ✅ DLP 모델/데이터/로스는 새 그룹으로 분리
  # (모델 구현은 이후에 갈아끼우기 쉬움: UNet / Pix2Pix 등)
  - model: unet_small
  - data: default       # local_trainpack or localLaptop_trainpack
  - LossFunction: physics_informedL1  #BCEWithLogitsL1Loss or physics_informedL1 or SigmoidL1Loss

  # 아래는 기존 hydra 뼈대 재사용용 (필요 없으면 점진적으로 제거)
  - optimizer: adamw
  - LRscheduler: CosineAnnealingLR
  - early_stop: none
  - aug: none

  # DLP inverse에서는 기하학 변환(rotate/flip/crop) 기본 OFF 권장.

# === 공통 학습 하이퍼파라미터 ===
GPU_NUM: 0
batch_size: 1
val_batch_size: 1
training_accum_steps: 4 # 🟢 추가: 1장씩 4번 모아서 업데이트 (실제 배치 4 효과)
training_amp: true   # 🔴 False (또는 주석) -> true 로 변경
num_epochs: 5
warmup_epochs: 0

lr: 1e-3
report_interval: 50000
seed: 430
num_workers: 8

exp_name: dlp_forward_benchmarkTest

# ✅ [New] Evaluation / Benchmark Config
evaluation:
  benchmark:
    enable: true
    data_root: "data/benchmark_160"
    proxy_checkpoint: "../result/forward_1/checkpoints/best_model.pt" # Forward 모델(Simulator) 경로
    log_every_n_epochs: 1
    forward_post:
      apply_sigmoid: true   # ✅ forward output이 logits면 true
    inverse_post:
      apply_sigmoid: true     # logits -> sigmoid(prob) 적용 여부
      binarize: false          # prob(or raw) -> binary mask 적용 여부
      binarize_thr: 0.5       # binarize threshold (0~1)
    curing:
      threshold: 0.23529         # curing depth threshold (0~1, 60/255)
      binarize: true          # forward 출력도 threshold로 binary로 만들지 여부
    mask_pixelize:
      enable: true
      size: 160          # coarse grid size (예: 160). infer_size=640이면 4x4 블록 평균이 됨
      downsample: "mean" # mean(=area/avg) downsample
      upsample: "nearest"
      apply_to: "corr"   # "both" | "naive" | "corr"

    # ✅ [NEW] Evaluation DoC stage toggle (LD->CI vs LD->DoC->CI)
    doc:
      enable: false
      gauss:
        enable: true
        kernel_size: 41
        sigma: 1
        n_iter: 1

    # ✅ [NEW] Band-only optimization at evaluation time (forward input constraint)
    bandopt:
      enable: true
      band_width: 21          # morphological band width (odd recommended)
      apply_to: "corr"        # "corr" | "both" (default corr)
      fixed_logit_val: 20.0   # used only if inverse_post.apply_sigmoid=false (logits blending)

# ✅ DLP image I/O 공통 옵션 (Dataset/Transform에서 사용)
image:
  size: 1280          # TrainPack이 1280으로 만들어졌다면 그대로
  in_channels: 1      # thr는 1ch grayscale
  out_channels: 1     # mask도 1ch
  normalize: "0_1"    # uint8 [0,255] → float [0,1]
  binarize_target: true   # mask는 최종적으로 binary라면 true (필요시 gray도 가능)

wandb:
  project: dlp_inverse_Debugging
  entity: swpants05-seoul-national-university        # W&B 팀/계정
  use_wandb: true
  
  # ✅ Train metric: iter 단위 로깅
  log_every_n_iters: 1000

  # ✅ Epoch마다 이미지 로깅 개수 (0이면 끔)
  log_images_per_epoch: 5
  log_images_split: "val"   # "train" | "val"

  use_visLogging: true

# ✅ [Log Path Fix] Hydra 로그가 현재 폴더에 쌓이지 않도록 경로 지정
hydra:
  run:
    # 결과가 저장되는 result 폴더 내부로 이동
    dir: ../result/${exp_name}/hydra_logs/${now:%Y-%m-%d}_${now:%H-%M-%S}
  sweep:
    dir: ../result/${exp_name}/hydra_sweep/${now:%Y-%m-%d}_${now:%H-%M-%S}
  job:
    chdir: false  # 코드가 실행되는 작업 디렉토리를 변경하지 않음 (경로 에러 방지)
